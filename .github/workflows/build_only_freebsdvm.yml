name: FreeBSD build

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Example of how tokens are propagated to the VM
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
    steps:
    - uses: actions/checkout@v4
    - name: Check commit message
      id: check_commit
      run: |
        commit_message=$(git log --format=%B -n 1 ${{ github.event.after }})
        if [[ "${commit_message}" == *"notest"* ]]; then
          echo "Commit contains 'notest'. Skipping tests."
          echo "SKIP=true" >> $GITHUB_ENV
        else
          echo "SKIP=false" >> $GITHUB_ENV
        fi
    - name: Test in FreeBSD
      id: test
      if: env.SKIP != 'true'
      uses: vmactions/freebsd-vm@v1
      with:
        # Example of how tokens are propagated to the VM
        envs: 'MYTOKEN MYTOKEN2'
        # Use sh shell
        usesh: true
        # When using rsync, you can define copyback: false to not copy files back from the VM in to the host.
        copyback: false
        prepare: |
          # Retry pkg install to work around transient vmactions/freebsd-vm pkg
          # signature-fingerprint truncation (repo claims "up to date" but
          # cannot be opened).  pkg update -f forces a fresh metadata fetch.
          for attempt in 1 2 3 ; do
            pkg update -f && pkg install -y bash gcc gmake libX11 curl pgplot && break
            echo "pkg install attempt $attempt failed, retrying..."
            sleep 10
          done

        run: |
          make
