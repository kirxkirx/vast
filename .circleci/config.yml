# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  build_ubuntu2404:
    # Specify the execution environment. You can specify an image from Dockerhub or use one of our Convenience Images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/2.0/configuration-reference/#docker-machine-macos-windows-executor
    machine:
      image: ubuntu-2404:current
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - checkout
      - run:
          name: install build deps and build
          # apt-get update is allowed to fail with a warning -- Ubuntu mirrors
          # have been intermittently unreachable, and the CircleCI machine
          # image ships with usable /var/lib/apt/lists, so the install steps
          # below still resolve against cached metadata.  The remaining steps
          # (install --fix-broken, install gfortran/ghostscript/bc, make) are
          # required to succeed; CircleCI's default 'set -e' aborts the job
          # on any non-zero exit from those.
          command: |
            sudo apt-get update --allow-releaseinfo-change \
              || echo "WARNING: apt-get update did not refresh; using cached package lists."
            sudo apt-get install --fix-broken -y
            sudo apt-get install -y gfortran ghostscript bc
            make
  build_ubuntu2204:
    # Specify the execution environment. You can specify an image from Dockerhub or use one of our Convenience Images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/2.0/configuration-reference/#docker-machine-macos-windows-executor
    machine:
      image: ubuntu-2204:current
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - checkout
      - run:
          name: install build deps and build
          # See note in build_ubuntu2404 above.  apt-get update is the only
          # tolerated failure; the install/build steps must succeed.
          command: |
            sudo apt-get update --allow-releaseinfo-change \
              || echo "WARNING: apt-get update did not refresh; using cached package lists."
            sudo apt-get install --fix-broken -y
            sudo apt-get install -y gfortran ghostscript bc
            make
  build_ubuntu2004:
    # Specify the execution environment. You can specify an image from Dockerhub or use one of our Convenience Images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/2.0/configuration-reference/#docker-machine-macos-windows-executor
    machine:
      image: ubuntu-2004:current
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - checkout
      - run: "sudo rm -f /etc/apt/sources.list.d/google*.list"
      - run:
          name: install build deps and build
          # See note in build_ubuntu2404 above.  apt-get update is the only
          # tolerated failure; the install/build steps must succeed.
          command: |
            sudo apt-get update --allow-releaseinfo-change \
              || echo "WARNING: apt-get update did not refresh; using cached package lists."
            sudo apt-get install --fix-broken -y
            sudo apt-get install -y gfortran ghostscript bc
            make

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  build-workflow:
    jobs:
      - build_ubuntu2404
      - build_ubuntu2204
      - build_ubuntu2004
